<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirect LinkedIn</title>

  <!-- Redirect immediato -->
  <meta http-equiv="refresh" content="0; url=https://www.linkedin.com/in/sscarinzi/" />

  <script>
    window.location.href = "https://www.linkedin.com/in/sscarinzi/";
  </script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0f1c;
      color: white;
      font-family: Arial, sans-serif;
    }

    .loader {
      text-align: center;
      opacity: 0.8;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    a {
      color: #4da3ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Reindirizzamento a LinkedIn...</p>
    <p>
      Se non vieni reindirizzato automaticamente,
      <a href="https://www.linkedin.com/in/sscarinzi/">clicca qui</a>.
    </p>
  </div>
</body>
</html>
