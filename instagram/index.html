<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirect Instagram</title>

  <!-- Redirect immediato -->
  <meta http-equiv="refresh" content="0; url=https://www.instagram.com/scarinzi.samuele_assicuratore/" />

  <script>
    window.location.href = "https://www.instagram.com/scarinzi.samuele_assicuratore/";
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(225,48,108,0.25), transparent 70%);
      animation: pulse 4s infinite ease-in-out;
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 22px;
      background: linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      animation: float 2.5s ease-in-out infinite;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      opacity: 0.75;
      line-height: 1.5;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 14px;
      background: linear-gradient(45deg,#ee2a7b,#6228d7);
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      opacity: 0.95;
    }

    @keyframes pulse {
      0%,100% {
        transform: scale(1);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @keyframes float {
      0%,100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-6px);
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="card">
    <div class="logo">📸</div>

    <h1>Reindirizzamento Instagram</h1>

    <p>
      Verrai portato automaticamente al profilo Instagram di
      Samuele Scarinzi.
    </p>

    <a class="btn"
       href="https://www.instagram.com/scarinzi.samuele_assicuratore/">
       Apri Instagram
    </a>
  </div>

</body>
</html>
